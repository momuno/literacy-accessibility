<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Accessing Literacy</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #ffffff;
      color: #1a1a2e;
      width: 260px;
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }

    .logo-icon {
      font-size: 22px;
    }

    .logo-text {
      font-size: 14px;
      font-weight: 700;
      color: #1a1a2e;
    }

    .label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #888;
      margin-bottom: 8px;
    }

    .grade-list {
      list-style: none;
      margin-bottom: 14px;
      border: 2px solid #e8e8e8;
      border-radius: 10px;
      overflow: hidden;
    }

    .grade-list li {
      display: flex;
      align-items: center;
      padding: 8px 12px;
      cursor: pointer;
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.12s;
      gap: 8px;
    }

    .grade-list li:last-child { border-bottom: none; }
    .grade-list li:hover { background: #f5f8ff; }

    .grade-list li.selected {
      background: #eef3ff;
      border-left: 3px solid #4361ee;
    }

    .grade-list li input[type="radio"] {
      accent-color: #4361ee;
      margin: 0;
      flex-shrink: 0;
    }

    .grade-name {
      flex: 1;
      font-size: 13px;
      color: #1a1a2e;
    }

    .grade-status {
      font-size: 13px;
      width: 18px;
      text-align: center;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid #d0d8ff;
      border-top-color: #4361ee;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    .buttons {
      display: flex;
      gap: 8px;
    }

    button {
      flex: 1;
      padding: 9px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }

    #submit-btn {
      background: #4361ee;
      color: white;
    }
    #submit-btn:hover { background: #3451d1; }
    #submit-btn:disabled {
      background: #e8e8e8;
      color: #aaa;
      cursor: default;
    }

    #off-btn {
      background: #f5f5f5;
      color: #555;
      border: 1px solid #e0e0e0;
    }
    #off-btn:hover { background: #ffe8e8; color: #c0392b; border-color: #ffb3b3; }

    .not-wikipedia {
      font-size: 12px;
      color: #888;
      text-align: center;
      padding: 20px 0 8px;
      line-height: 1.7;
    }

    .not-wikipedia .icon { font-size: 28px; display: block; margin-bottom: 8px; }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo-icon">📖</span>
    <span class="logo-text">Accessing Literacy</span>
  </div>

  <div id="main-ui">
    <div class="label">Reading level</div>
    <ul class="grade-list" id="grade-list"></ul>
    <div class="buttons">
      <button id="submit-btn">Apply</button>
      <button id="off-btn">Off / Restore original</button>
    </div>
  </div>

  <div id="not-wikipedia" class="not-wikipedia" style="display:none">
    <span class="icon">📖</span>
    Open an English Wikipedia article to use Accessing Literacy.
  </div>

  <script src="popup.js"></script>
</body>
</html>
